name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            -H "apikey: sb_publishable_WH03h2sGLMoeaEq-oTJVIQ_38C2yA7z" \
            "https://pecjwdwuntuhfjxkydwe.supabase.co/rest/v1/profiles?select=id&limit=1"
      - name: Ping Supabase Auth
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            -H "apikey: sb_publishable_WH03h2sGLMoeaEq-oTJVIQ_38C2yA7z" \
            "https://pecjwdwuntuhfjxkydwe.supabase.co/auth/v1/health"
